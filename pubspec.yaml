name: uv_index_app
description: "Live UV index for your location."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  geolocator: ^13.0.2
  shared_preferences: ^2.3.3
  cupertino_icons: ^1.0.8
  home_widget: ^0.9.3
  workmanager: ^0.9.0+3
  geocoding: ^4.0.0
  flutter_local_notifications: ^22.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#2B1919"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
